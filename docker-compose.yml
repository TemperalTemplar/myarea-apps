services:
  web:
    build: .
    container_name: myarea_apps_web
    restart: unless-stopped
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY:-}
      - SOCIAL_API_URL=${SOCIAL_API_URL:-http://myarea_social_web:5000}
      - GEOZONES_API_URL=${GEOZONES_API_URL:-http://geozones_web:5000}
      - POSITIVE_API_URL=${POSITIVE_API_URL:-http://positive_engine:8000}
      - CRIMEWARS_API_URL=${CRIMEWARS_API_URL:-http://myarea_games_web:5000}
    expose:
      - "5000"
    networks:
      - myarea_apps_net
      - myarea_shared_net

  nginx:
    image: nginx:1.25-alpine
    container_name: myarea_apps_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8916}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - web
    networks:
      - myarea_apps_net

networks:
  myarea_apps_net:
    driver: bridge
  myarea_shared_net:
    external: true
    name: myarea_shared_net
